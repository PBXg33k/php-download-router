api_platform:
    title: Download Router
    version: 0.1.2
    # Mercure integration, remove if unwanted
    mercure:
        include_type: true
    # Good defaults for REST APIs
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    messenger:
        enabled: true
    formats:
        jsonld: ["application/ld+json"]
        json: ["application/json"]
        xml: ["application/xml", "text/xml"]
        yaml: ["application/x-yaml"]
    oauth:
        enabled: '%oidc.enabled%'
        clientId: '%oidc.client_id%'
        # The OAuth client secret.
        clientSecret: '%oidc.client_secret%'

        # The OAuth type.
        type: 'oauth2'

        # The OAuth flow grant type.
        flow: 'authorizationCode'

        # The OAuth token URL. Make sure to check the specification tokenUrl is not needed for an implicit flow.
        tokenUrl: '%oidc.token_url%'

        # The OAuth authentication URL.
        authorizationUrl: '%oidc.authorization_url%'

        # The OAuth scopes.
        scopes: [ 'profile', 'email', 'offline_access', 'openid' ]
