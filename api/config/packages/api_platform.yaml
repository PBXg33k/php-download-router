api_platform:
    title: Download Router
    version: 0.1.2
    # Mercure integration, remove if unwanted
    mercure:
        include_type: true
    # Good defaults for REST APIs
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    messenger:
        enabled: true
    formats:
        jsonld: ["application/ld+json"]
        json: ["application/json"]
        xml: ["application/xml", "text/xml"]
        yaml: ["application/x-yaml"]
    oauth:
        enabled: '%oidc.enabled%'
        clientId: '%oidc.client_id%'
        # The OAuth client secret.
        clientSecret: '%oidc.client_secret%'

        # The OAuth type.
        type: 'oauth2'

        # The OAuth flow grant type.
        flow: 'authorizationCode'

        # The OAuth token URL. Make sure to check the specification tokenUrl is not needed for an implicit flow.
        tokenUrl: '%oidc.token_url%'

        # The OAuth authentication URL.
        authorizationUrl: '%oidc.authorization_url%'

        # The OAuth scopes.
        scopes:
            profile: "This scope value requests access to the End-User's default profile Claims, which are: name, family_name, given_name, middle_name, nickname, preferred_username, profile, picture, website, gender, birthdate, zoneinfo, locale, and updated_at."
            email: "This scope value requests access to the email and email_verified Claims."
            offline_access: "This scope value requests that the authorization server issue a refresh token that can be used to obtain new access tokens when the current access token becomes invalid or expires."
            openid: "This scope value requests that the issued ID Token is a JSON Web Token (JWT)."
            groups: "This scope value requests access to the groups Claims."

