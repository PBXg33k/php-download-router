# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    locale: 'en'
    app.download_dir: '/downloads'
    downloader.gallery_dl_web.enabled: true
    downloader.gallery_dl_web.host: 'http://gallery-dl:9080'

    downloader.gallery_dl_cli.enabled: true
    downloader.gallery_dl_cli.downloads_dir: '%app.download_dir%'
    downloader.gallery_dl_cli.binary_path: '/usr/local/bin/gallery-dl'
    downloader.gallery_dl_cli.config_path: '%kernel.project_dir%/config/gallery-dl/config.json'

    downloader.yt_dlp.enabled: true
    downloader.yt_dlp.binary_path: '/usr/local/bin/yt-dlp'
    downloader.yt_dlp_cli.enabled: true
    downloader.yt_dlp_cli.downloads_dir: '%app.download_dir%'
    downloader.yt_dlp_cli.binary_path: '/usr/local/bin/yt-dlp'
    downloader.yt_dlp_cli.config_path: '%kernel.project_dir%/config/yt-dlp/yt-dlp.conf'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
    
    _instanceof:
        App\Service\Downloader\DownloaderInterface:
            tags: ['app.downloader']

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones


    # Gedmo Timestampable Extension Listener
    gedmo.listener.timestampable:
        class: Gedmo\Timestampable\TimestampableListener
        tags:
            - { name: doctrine.event_listener, event: 'prePersist' }
            - { name: doctrine.event_listener, event: 'onFlush' }
            - { name: doctrine.event_listener, event: 'loadClassMetadata' }
        calls:
            # Uncomment the below call if using attributes, and comment the call for the annotation reader
            # - [ setAnnotationReader, [ '@gedmo.mapping.driver.attribute' ] ]
            # The `annotation_reader` service was deprecated in Symfony 6.4 and removed in Symfony 7.0
            # - [ setAnnotationReader, [ '@annotation_reader' ] ]
            # The `clock` service was introduced in Symfony 6.2; if using an older Symfony version, you can either comment this call or provide your own PSR-20 Clock implementation
            - [ setClock, [ '@clock' ] ]
