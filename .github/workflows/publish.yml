name: Publish Docker images
on:
  release: 
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
    publish:
        name: Publish
        runs-on: ubuntu-latest
        permissions: 
            contents: read
            packages: write
            id-token: write
        steps:
        -
            name: Checkout
            uses: actions/checkout@v6
        -
            name: Docker meta
            id: meta
            uses: docker/metadata-action@v5
            with:
              tags: |
                type=ref,event=branch
                type=ref,event=pr
                type=semver,pattern={{version}}
                type=semver,pattern={{major}}.{{minor}}
        -
            name: Set registry name
            run: echo "IMAGE_PREFIX=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
        -
            name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3
        -
            name: Log in to GitHub Container Registry
            uses: docker/login-action@v3
            with:
              registry: ${{ env.REGISTRY }}
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}
        -
            name: Build and push Docker images
            uses: docker/bake-action@v7
            env:
              IMAGES_PREFIX: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
              TAGS: ${{ join(fromJSON(steps.meta.outputs.json).tags,',') }}
            with:
              pull: true
              load: true
              push: true
              files: |
                  compose.yaml
                  compose.prod.yaml
                  ./docker-bake.hcl
                  cwd://${{ steps.meta.outputs.bake-file-tags }}
              set: |
                  php.cache-from=type=gha,scope=php-${{github.ref}}
                  php.cache-from=type=gha,scope=php-refs/heads/main
                  php.cache-to=type=gha,scope=php-${{github.ref}},mode=max
                  pwa.cache-from=type=gha,scope=pwa-${{github.ref}}
                  pwa.cache-from=type=gha,scope=pwa-refs/heads/main
                  pwa.cache-to=type=gha,scope=pwa-${{github.ref}},mode=max
                  php.args.APP_VERSION=${{ steps.meta.outputs.version }}
                  pwa.args.APP_VERSION=${{ steps.meta.outputs.version }}
