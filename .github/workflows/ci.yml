name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request: ~
  workflow_dispatch: ~

env:
  REGISTRY: ghcr.io
  IMAGES_PREFIX: gh-runner-test


concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Set registry name
        run: echo "IMAGE_PREFIX=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      -
        name: Build Docker images
        uses: docker/bake-action@v6
        env:
          IMAGES_PREFIX: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            php.cache-from=type=gha,scope=php-${{github.ref}}
            php.cache-from=type=gha,scope=php-refs/heads/main
            php.cache-to=type=gha,scope=php-${{github.ref}},mode=max
            worker.cache-from=type=gha,scope=php-${{github.ref}}
            worker.cache-from=type=gha,scope=php-refs/heads/main
            worker.cache-to=type=gha,scope=php-${{github.ref}},mode=max
            pwa.cache-from=type=gha,scope=pwa-${{github.ref}}
            pwa.cache-from=type=gha,scope=pwa-refs/heads/main
            pwa.cache-to=type=gha,scope=pwa-${{github.ref}},mode=max
      -
        name: Start services
        id: start_services
        env:
          IMAGES_PREFIX: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
        run: docker compose up --wait --no-build
      -
        name: Debug in case services do not start
        if: failure() && steps.start_services.outcome == 'failure'
        run: docker compose logs --no-color
      -
        name: Install composer dependencies
        run: docker compose exec -T php composer install --prefer-dist --no-progress --optimize-autoloader
      -
        name: Check HTTP reachability
        run: curl -v --fail-with-body http://localhost
      -
        name: Check API reachability
        run: curl -vk --fail-with-body https://localhost
      -
        name: Check PWA reachability
        continue-on-error: true
        run: "curl -vk --fail-with-body -H 'Accept: text/html' https://localhost"
      -
        name: Check Mercure reachability
        run: curl -vkI --fail-with-body https://localhost/.well-known/mercure?topic=test
        continue-on-error: true
      -
        name: Create test database
        env:
          IMAGES_PREFIX: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
        run: docker compose exec -T php bin/console -e test doctrine:database:create
      -
        name: Run migrations
        env:
          IMAGES_PREFIX: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
        run: docker compose exec -T php bin/console -e test doctrine:migrations:migrate --no-interaction
      -
        name: Run PHPUnit
        env:
          IMAGES_PREFIX: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
        run: docker compose exec -T php bin/phpunit
      -
        name: Code Coverage Summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: build/logs/clover.xml
          badge: 'true'
      -
        name: Doctrine Schema Validator
        env:
          IMAGES_PREFIX: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
        run: docker compose exec -T php bin/console -e test doctrine:schema:validate
      -
        name: Stop services
        if: always()
        env:
          IMAGES_PREFIX: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
        run: docker compose down -v --remove-orphans
  lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.3.0
        with:
          recursive: true
